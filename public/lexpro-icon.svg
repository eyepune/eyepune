<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" /> <!-- Navy Blue 600 -->
      <stop offset="100%" stop-color="#0F172A" /> <!-- Slate 900 -->
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" /> <!-- Light Blue 400 -->
      <stop offset="100%" stop-color="#334155" /> <!-- Slate 700 -->
    </linearGradient>
  </defs>
  
  <!-- Vertical Stem (Pillar of Justice) -->
  <rect x="150" y="100" width="70" height="270" rx="20" fill="url(#grad1)"/>
  
  <!-- Horizontal Stem (Scale Base) -->
  <rect x="150" y="300" width="220" height="70" rx="20" fill="url(#grad2)"/>
  
  <!-- Digital Accent (AI / Digital Node) -->
  <circle cx="350" cy="170" r="25" fill="#3B82F6" />
</svg>
