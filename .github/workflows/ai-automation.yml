name: Autonomous AI Growth Engine

on:
  schedule:
    # Run every day at 09:00 UTC (2:30 PM IST)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  run-ai-blog-and-social:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AI Blog & LinkedIn Syndication
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Triggering AI Growth Automation endpoint..."
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET "https://www.eyepune.com/api/automation/ai-blog" \
            -H "Authorization: Bearer $CRON_SECRET")
          
          # Extract the body and the status code
          body=$(echo "$response" | sed -e 's/HTTP_STATUS\:.*//g')
          status=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          
          echo "Response Body: $body"
          echo "Status Code: $status"
          
          if [ "$status" -ne 200 ]; then
            echo "::error::Automation failed with status $status"
            exit 1
          fi
          
          echo "✅ Autonomous engine executed successfully."
