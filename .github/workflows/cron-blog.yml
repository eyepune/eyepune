name: AI Blog Automation Cron

on:
  schedule:
    # Runs once a day to save Vercel compute limits
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AI Blog Endpoint
        run: |
          curl -f -X GET "https://www.eyepune.com/api/automation/ai-blog" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
