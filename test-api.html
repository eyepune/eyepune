<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LexPro API Test</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; background: #0a0a0a; color: white;">
    <h1>Running LexPro Backend Test...</h1>
    <pre id="output" style="background: #111; padding: 20px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; color: #4ade80;"></pre>

    <script>
        const output = document.getElementById('output');
        const log = (msg) => { output.innerHTML += msg + '\n'; };

        async function runTest() {
            log('Starting Test Sequence...');
            const LLM_API_KEY = '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';
            const LLM_API_URL = 'https://integrate.api.nvidia.com/v1/chat/completions';

            try {
                log('1. Testing LLaMa 3.1 AI Connection (Drafting)...');
                const prompt = 'You are an expert Indian corporate lawyer. Draft a short 2-sentence NDA between Party A (EyE PunE) and Party B (John Doe). Output ONLY raw text.';
                
                const res = await fetch(LLM_API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': 'Bearer ' + LLM_API_KEY 
                    },
                    body: JSON.stringify({
                        model: 'meta/llama-3.1-8b-instruct',
                        messages: [{ role: 'user', content: prompt }],
                        temperature: 0.2,
                        max_tokens: 100
                    })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    log('✅ SUCCESS: Nvidia LLaMa 3.1 is responding properly!');
                    log('--- AI DRAFT OUTPUT ---');
                    log(data.choices[0].message.content);
                    log('-----------------------');
                } else {
                    log('❌ FAILED: Nvidia API returned ' + res.status);
                }

                log('\n2. Testing Risk Analysis Logic...');
                const analyzePrompt = 'Review this clause: "Party B must pay 1,000,000 USD if they break confidentiality." Return JSON with {"score": 50, "summary": "Too high", "clauses": []} format.';
                
                const res2 = await fetch(LLM_API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': 'Bearer ' + LLM_API_KEY 
                    },
                    body: JSON.stringify({
                        model: 'meta/llama-3.1-8b-instruct',
                        messages: [{ role: 'user', content: analyzePrompt }],
                        temperature: 0.1,
                        max_tokens: 100
                    })
                });

                if (res2.ok) {
                    const data2 = await res2.json();
                    log('✅ SUCCESS: Nvidia Risk Analysis Prompt is working!');
                    log('--- AI RISK OUTPUT ---');
                    log(data2.choices[0].message.content);
                    log('-----------------------');
                    log('\n✅ ALL TESTS PASSED SUCCESSFULLY!');
                    
                    // Create a hidden div to signal completion to the browser agent
                    const div = document.createElement('div');
                    div.id = 'test-complete';
                    document.body.appendChild(div);
                }

            } catch (err) {
                log('❌ ERROR: ' + err.message);
            }
        }

        runTest();
    </script>
</body>
</html>
